<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://www.17track.net/externalcall.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --pl: #818cf8;
            --bg: #0a0f1e;
            --card: rgba(20, 30, 55, .78);
            --txt: #f1f5f9;
            --muted: #94a3b8;
            --bdr: rgba(255, 255, 255, .09);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, .15), transparent 50%);
            color: var(--txt);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 800px; margin-top: 20px; }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            width: 100%;
            max-width: 800px;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            color: var(--muted);
            text-decoration: none;
            font-size: 1.6rem;
            padding: 8px 14px;
            border: 1px solid var(--bdr);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
            line-height: 1;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .photo-container {
            width: 100%;
            margin-bottom: 25px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: #000;
        }
        .photo-container img {
            width: 100%;
            height: auto;
            max-height: 600px;
            object-fit: contain;
            display: block;
        }
        .dl-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(99, 102, 241, 0.9);
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .dl-btn:hover { transform: translateY(-2px); background: #4f46e5; }

        .info-card {
            background: var(--card);
            border: 1px solid var(--bdr);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            text-align: left;
            backdrop-filter: blur(15px);
        }
        .info-card h2 { font-size: 1.2rem; margin-bottom: 5px; color: #fff; }
        .info-card p { font-size: 0.9rem; color: var(--muted); }
        .info-card span { color: var(--primary); font-weight: 700; }
        
        .badge {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 10px;
        }

        .delhivery-instruction {
            margin-top: 15px;
            padding: 12px 16px;
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 10px;
            color: #fbbf24;
            font-weight: 500;
            display: none;
        }

        #YQContainer {
            width: 100%;
            min-height: 650px;
            border-radius: 20px;
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn">←</a>
        <h1>🚚 Parcel Dashboard</h1>
        <div style="width:50px;"></div>
    </div>

    <div class="container">
        <!-- Photo Section -->
        <div id="photo-area" class="photo-container" style="display:none;">
            <img id="parcel-photo" src="" alt="Parcel Photo">
            <a id="dl-link" href="#" class="dl-btn" download="parcel_photo.jpg">⬇️ Download Photo</a>
        </div>

        <!-- Info Section -->
        <div class="info-card">
            <div class="badge">📦 Official Parcel Record</div>
            <h2 id="cust-name">Loading...</h2>
            <p id="cust-meta">📍 -- | 📞 --</p>
            
            <div style="margin-top:15px; border-top:1px solid var(--bdr); padding-top:15px;">
                <div id="carrier-info" style="font-size:0.7rem; color:var(--primary); font-weight:700; text-transform:uppercase; margin-bottom:4px;">Tracking Number</div>
                <div style="font-size:1.4rem; font-weight:700; letter-spacing:1px;" id="awb-display">Loading...</div>
            </div>

            <!-- Instruction Only for Delhivery -->
            <div class="delhivery-instruction" id="delhivery-msg">
                Type <strong>1</strong> in Postcode box and Confirm to check live tracking
            </div>
        </div>
       
        <!-- 17Track Widget -->
        <div id="YQContainer">
            <div style="padding:80px; text-align:center; color:#666;">
                ⌛ Initializing Tracking Service...
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const awb = params.get('awb')?.trim();
        const photo = params.get('photo');
        const name = params.get('name');
        const pin = params.get('pin');
        const phone = params.get('phone');

        if (!awb) {
            document.querySelector('.info-card').innerHTML = "<div style='text-align:center; padding:20px;'>❌ No tracking number provided.</div>";
            document.getElementById('YQContainer').style.display = 'none';
        } else {
            document.getElementById('awb-display').textContent = awb;
            if (name) document.getElementById('cust-name').textContent = `👤 ${decodeURIComponent(name)}`;
            if (pin && phone) document.getElementById('cust-meta').textContent = `📍 ${pin} &nbsp;|&nbsp; 📞 ${phone}`;
            
            if (photo) {
                document.getElementById('parcel-photo').src = decodeURIComponent(photo);
                document.getElementById('dl-link').href = decodeURIComponent(photo);
                document.getElementById('photo-area').style.display = 'block';
            }

            function getCarrierCode(trackingNum) {
                const num = trackingNum.toUpperCase().trim();

                // DTDC
                if (num.startsWith('D') || num.startsWith('W') || num.startsWith('X') || num.startsWith('U')) {
                    document.getElementById('carrier-info').textContent = 'Carrier: DTDC';
                    return "100069";
                }

                // Trackon - Multiple prefixes
                if (num.startsWith('5006') || num.startsWith('1003')) {
                    document.getElementById('carrier-info').textContent = 'Carrier: Trackon';
                    return "100180";
                }

                // Delhivery
                if (num.startsWith('356') || num.startsWith('19')) {
                    document.getElementById('carrier-info').textContent = 'Carrier: Delhivery';
                    document.getElementById('delhivery-msg').style.display = 'block';
                    return "100060";
                }

                // Default - Auto detect
                document.getElementById('carrier-info').textContent = 'Carrier: Detecting...';
                return "0";
            }

            function initTracking() {
                if (typeof YQV5 !== 'undefined') {
                    document.getElementById('YQContainer').innerHTML = '';
                    const carrierCode = getCarrierCode(awb);

                    YQV5.trackSingle({
                        YQ_ContainerId: "YQContainer",
                        YQ_Height: 650,
                        YQ_Lang: "en",
                        YQ_Num: awb,
                        YQ_Fc: carrierCode
                    });
                } else if (typeof YQ511 !== 'undefined') {
                     // Fallback to older version if V5 is not available yet
                     YQ511.trackSingle({
                        YQ_ContainerId: "YQContainer",
                        YQ_Height: 650,
                        YQ_Lang: "en",
                        YQ_Num: awb
                    });
                } else {
                    setTimeout(initTracking, 400);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initTracking);
            } else {
                initTracking();
            }
        }
    </script>
</body>
</html>
